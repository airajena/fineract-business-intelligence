version: 2

sources:
  - name: raw
    schema: raw
    description: >
      Raw tables loaded by the Fineract extractor from the operational
      Apache Fineract database.  One row per source record; no
      transformations applied beyond column-name normalisation.
    loaded_at_field: source_loaded_at
    freshness:
      warn_after: {count: 24, period: hour}
      error_after: {count: 72, period: hour}

    tables:
      - name: raw_m_office
        description: >
          Organisational chart of branches and sub-offices.  Each row
          represents one office node; parent_id links to the parent office
          enabling hierarchy traversal.

      - name: raw_m_currency
        description: >
          Reference table of currencies configured in Fineract including
          display symbols, decimal places, and internationalisation codes.

      - name: raw_m_client
        description: >
          Individual or legal-entity clients registered in Fineract.
          Contains demographic attributes (gender, date_of_birth) and
          lifecycle status.  PII fields must not be propagated past staging.

      - name: raw_m_product_loan
        description: >
          Loan product templates that define default interest rates,
          repayment schedules, and NPA overdue-day thresholds applied
          when a loan is originated.

      - name: raw_m_loan
        description: >
          Core loan ledger — one row per loan account.  Carries lifecycle
          status (loan_status_id), disbursement details, and all
          pre-computed derived balance columns updated by Fineract batch
          jobs.

      - name: raw_m_loan_transaction
        description: >
          Individual monetary events against a loan account such as
          disbursements, repayments, write-offs, and waived charges.
          Reversed transactions are flagged with is_reversed = true and
          must be excluded from analytical aggregations.

      - name: raw_m_delinquency_range
        description: >
          Configurable delinquency age bands (e.g. 1–29 days, 30–59 days)
          that classify overdue loans.  min_age_days and max_age_days define
          the inclusive day range for the band.

      - name: raw_m_delinquency_bucket
        description: >
          Named delinquency buckets that group one or more delinquency ranges
          into a single reportable category (e.g. "PAR 30", "PAR 90+").

      - name: raw_m_delinquency_bucket_mappings
        description: >
          Many-to-one mapping between delinquency_range records and their
          parent delinquency_bucket.  Enables bucket-level PAR reporting.

      - name: raw_m_loan_delinquency_tag_history
        description: >
          Audit trail of delinquency range tags applied to and lifted from
          individual loan accounts.  addedon_date marks when the tag was
          applied; liftedon_date marks when it was removed (NULL = still
          active).

      - name: raw_batch_job_execution
        description: >
          Spring Batch job execution log produced by Fineract's scheduled
          batch processor.  Used to monitor pipeline health and detect
          missed or failed batch runs.
